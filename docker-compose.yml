services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: samayak
      POSTGRES_PASSWORD: samayak
      POSTGRES_DB: samayak
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build:
      context: .
      dockerfile: ./dockerfiles/backend.dockerfile
      args:
        - DATABASE_URL=postgresql://samayak:samayak@postgres:5432/samayak
    environment:
      DATABASE_URL: postgresql://samayak:samayak@postgres:5432/samayak
      GROQ_API_KEY: ${GROQ_API_KEY}
      REDIS_URL: redis://redis:6379
      PORT: 3001
      JWT_SECRET: supersecret
      ADMIN_SECRET: Iamtheadmin
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: ./dockerfiles/frontend.dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://backend:3001
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata: